name: deploy

on:
  push:
  workflow_dispatch:
  # schedule:
  # Runs everyday at 8:00 AM
  # - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Build Web
        run: hugo -t github-style

      - name: Deploy Web
        uses: peaceiris/actions-gh-pages@v3
        with:
          PERSONAL_TOKEN: ${{ secrets.TOKEN }}
          EXTERNAL_REPOSITORY: 014-code.github.io/014.github.io/
          PUBLISH_BRANCH: main
          PUBLISH_DIR: ./public
          commit_message: ${{ github.event.head_commit.message }}